<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#131722" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='%2321B053'><rect width='32' height='32' rx='6'/></svg>" />
    <title>eToro — Торговля и инвестиции</title>
    <meta name="description" content="eToro — торгуйте криптовалютой, акциями и сырьём. Социальный трейдинг, безопасный вывод, поддержка 24/7." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              /* «Финансовый штиль»: сплошные глубокие цвета */
              background: '#131722',
              surface: '#151c2c',
              card: '#1E222D',         /* карточки, панели — плоский тёмный */
              border: '#2A2E39',      /* строгая рамка */
              surfaceElevated: '#1e293b',
              neon: '#21B053',
              subtle: '#1a2235',
              up: '#10b981',
              down: '#f87171',
              textMuted: '#94a3b8',
              textSubtle: '#64748b',
              textPrimary: '#E0E0E0',
              textSecondary: '#8A8A8E',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Roboto Mono', 'monospace'],
            },
            fontSize: {
              'cap': ['10px', { lineHeight: '1.25', letterSpacing: '0.05em' }],
            },
            letterSpacing: {
              'heading': '-0.02em',
              'cap': '0.05em',
            },
            borderRadius: {
              card: '12px',
              modal: '16px',
              strict: '4px',
            },
            boxShadow: {
              'none': 'none',
              'glass': '0 0 0 1px rgba(255, 255, 255, 0.08)',
            },
            transitionDuration: {
              'hover': '200ms',
              'card': '300ms',
              'modal': '300ms',
            },
            transitionTimingFunction: {
              'etoro': 'cubic-bezier(0.4, 0, 0.2, 1)',
              'etoro-smooth': 'cubic-bezier(0.25, 0.8, 0.25, 1)',
            },
            /* Сетка 4px/8px: spacing для блоков и плотных таблиц */
            spacing: {
              '0.5': '2px',
              '1': '4px',
              '2': '8px',
              '3': '12px',
              '4': '16px',
              '5': '20px',
              '6': '24px',
              '8': '32px',
              '10': '40px',
              '12': '48px',
              'panel': '16px',   /* внешние отступы панелей */
              'block': '24px',   /* между логическими блоками (стакан/график/форма) */
              'table': '4px',    /* внутренние отступы в таблицах (data density) */
            },
            backdropBlur: {
              glass: '12px',
              modal: '16px',
            },
          },
        },
      }
    </script>
    <style>
      /* --- Design tokens: 4/8px grid, motion, colors --- */
      :root {
        --space-unit: 4px;
        --space-2: 8px;
        --space-4: 16px;
        --space-6: 24px;
        --space-8: 32px;
        --ease-modal: cubic-bezier(0.4, 0, 0.2, 1);
        --duration-flash: 300ms;
        --duration-modal: 300ms;
        --color-flash-up: rgba(16, 185, 129, 0.35);
        --color-flash-down: rgba(248, 113, 113, 0.35);
        --border-subtle: 1px solid rgba(42, 46, 57, 0.8);
        --border-beam: 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      @media (prefers-reduced-motion: reduce) {
        :root { --duration-flash: 0ms; --duration-modal: 0ms; }
      }

      html {
        height: 100%;
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      body {
        height: 100%;
        background-color: #131722;
        color: #E0E0E0;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        text-shadow: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
        overflow-x: hidden;
        overflow-y: hidden;
      }
      input, select, textarea {
        font-size: 16px !important;
        touch-action: manipulation;
      }
      input:focus, select:focus, textarea:focus {
        font-size: 16px !important;
      }
      /* Keep focused input visible when keyboard opens (scroll margin) */
      input, textarea, select {
        scroll-margin-bottom: 80px;
      }
      /* Instant touch response, no 300ms delay */
      button, a, [role="button"], .cursor-pointer {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      /* Custom scrollbar for "Excel" feel */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #131722;
      }
      ::-webkit-scrollbar-thumb {
        background: #2A2E39;
        border-radius: 4px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up {
        animation: slide-up 0.28s var(--ease-modal) forwards;
      }
      @keyframes sheet-up {
        from { opacity: 0; transform: translateY(100%); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-sheet-up {
        animation: sheet-up var(--duration-modal) cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      }
      @keyframes modal-scale-in {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-modal-in {
        animation: modal-scale-in var(--duration-modal) var(--ease-modal) forwards;
      }
      @keyframes slide-in-right {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-in-right {
        animation: slide-in-right 0.22s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      }
      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.94); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scale-in 0.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      }
      @keyframes price-fade {
        from { opacity: 0.5; }
        to { opacity: 1; }
      }
      .animate-price-fade {
        animation: price-fade 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes check-draw {
        from { stroke-dashoffset: 24; opacity: 0.6; }
        to { stroke-dashoffset: 0; opacity: 1; }
      }
      .animate-check-draw {
        stroke-dasharray: 24;
        animation: check-draw 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) 0.2s forwards;
        stroke-dashoffset: 24;
      }
      /* Иконка успеха: анимация галочки (альтернатива check-draw для path/stroke) */
      @keyframes check-stroke {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-check-stroke {
        animation: check-stroke 0.35s cubic-bezier(0.25, 0.8, 0.25, 1) 0.15s forwards;
        opacity: 0;
      }
      @keyframes circle-fade {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-circle-fade {
        animation: circle-fade 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      .transition-etoro {
        transition-duration: 200ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      .transition-etoro-card {
        transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 40s linear infinite;
      }
      /* График: плавное появление 0.6s */
      @keyframes chart-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-chart-in {
        animation: chart-fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      /* Order Book: Flash effect — мягкая смена цвета при обновлении цены (300ms) */
      @keyframes flash-up {
        from { background-color: var(--color-flash-up); }
        to { background-color: transparent; }
      }
      @keyframes flash-down {
        from { background-color: var(--color-flash-down); }
        to { background-color: transparent; }
      }
      .animate-flash-up {
        animation: flash-up var(--duration-flash) var(--ease-modal) forwards;
      }
      .animate-flash-down {
        animation: flash-down var(--duration-flash) var(--ease-modal) forwards;
      }

      /* Модалки и вкладки: cubic-bezier(0.4, 0, 0.2, 1) */
      .transition-modal {
        transition: opacity var(--duration-modal) var(--ease-modal),
                    transform var(--duration-modal) var(--ease-modal);
      }

      /* Hover: деликатное подсвечивание строк и кнопок */
      .hover-row:hover {
        background-color: rgba(255, 255, 255, 0.04);
        transition: background-color 0.15s var(--ease-modal);
      }
      .hover-glow:focus-visible,
      .hover-glow:hover {
        box-shadow: 0 0 0 1px rgba(33, 176, 83, 0.25);
        transition: box-shadow 0.2s var(--ease-modal);
      }

      /* Тонкий разделитель вместо жёсткой линии */
      .border-subtle {
        border: var(--border-subtle);
      }

      /* Полноэкранный оверлей под модалки и экраны */
      .fullscreen-overlay {
        position: fixed;
        inset: 0;
        min-height: 100dvh;
        min-height: 100vh;
        z-index: 100;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      /* Мин. зона нажатия для тач-устройств (44px+) */
      .touch-target {
        min-height: 44px;
        min-width: 44px;
      }
      /* Плавный скролл как в нативном приложении */
      .scroll-app {
        -webkit-overflow-scrolling: touch;
        overflow-scrolling: touch;
      }

      /* Safe-area: нижний отступ для шитов и фиксированных блоков */
      .pb-safe {
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",

  }
  }
</script>
</head>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
