      /* --- Design tokens: 4/8px grid, motion, colors --- */
      :root {
        /* Сетка 8px: секции 32, блоки 24, инлайн 16 */
        --space-unit: 8px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 32px;
        --radius-card: 12px;
        --radius-control: 12px;
        --radius-sheet: 16px;
        --icon-nav-size: 22px;
        --icon-nav-stroke: 2;
        --ease-modal: cubic-bezier(0.4, 0, 0.2, 1);
        --duration-flash: 300ms;
        --duration-modal: 300ms;
        --color-flash-up: rgba(16, 185, 129, 0.35);
        --color-flash-down: rgba(248, 113, 113, 0.35);
        --border-subtle: 1px solid rgba(255, 255, 255, 0.06);
        --border-beam: 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      @media (prefers-reduced-motion: reduce) {
        :root { --duration-flash: 0ms; --duration-modal: 0ms; }
        .landing-animate,
        .landing-float {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .animate-fade-in,
        .animate-sheet-up,
        .animate-slide-in-right,
        .animate-slide-up,
        .animate-modal-in,
        .animate-scale-in,
        .animate-marquee,
        .animate-flash-up,
        .animate-flash-down,
        .animate-pulse,
        .animate-chart-in,
        .animate-price-fade,
        .animate-check-draw,
        .animate-check-stroke,
        .animate-circle-fade,
        [class*="animate-"] {
          animation: none !important;
          transition: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
      @keyframes landing-rise {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes landing-glow-shift {
        0%, 100% { opacity: 0.85; transform: scale(1) translate(0, 0); }
        50% { opacity: 1; transform: scale(1.03) translate(2%, -1%); }
      }
      .landing-animate {
        animation: landing-rise 0.65s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        opacity: 0;
      }
      .landing-d1 { animation-delay: 0.04s; }
      .landing-d2 { animation-delay: 0.1s; }
      .landing-d3 { animation-delay: 0.16s; }
      .landing-d4 { animation-delay: 0.22s; }
      .landing-d5 { animation-delay: 0.28s; }
      .landing-d6 { animation-delay: 0.34s; }
      .landing-float {
        animation: landing-glow-shift 12s ease-in-out infinite;
      }

      html {
        height: 100%;
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      body {
        height: 100%;
        background-color: #131722;
        color: #ECEEF1;
        font-family: 'Inter', system-ui, -apple-system, 'SF Pro Text', sans-serif;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
        -webkit-font-smoothing: antialiased;
        text-shadow: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
        overflow-x: hidden;
        overflow-y: hidden;
      }
      /* Лендинг и прочие полноэкранные экраны без Layout: скролл здесь, иначе body обрезает контент */
      #root {
        height: 100%;
        max-height: 100dvh;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }
      input, select, textarea {
        font-size: 16px !important;
        touch-action: manipulation;
      }
      input:focus, select:focus, textarea:focus {
        font-size: 16px !important;
      }
      /* Keep focused input visible when keyboard opens (scroll margin) */
      input, textarea, select {
        scroll-margin-bottom: 80px;
      }
      /* Instant touch response, no 300ms delay */
      button, a, [role="button"], .cursor-pointer {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      /* Custom scrollbar for "Excel" feel */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #131722;
      }
      ::-webkit-scrollbar-thumb {
        background: #2A2E39;
        border-radius: 4px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up {
        animation: slide-up 0.28s var(--ease-modal) forwards;
      }
      @keyframes sheet-up {
        from { opacity: 0; transform: translateY(100%); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-sheet-up {
        animation: sheet-up var(--duration-modal) cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      }
      @keyframes modal-scale-in {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-modal-in {
        animation: modal-scale-in var(--duration-modal) var(--ease-modal) forwards;
      }
      @keyframes slide-in-right {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-in-right {
        animation: slide-in-right 0.22s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      }
      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.94); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scale-in 0.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      }
      @keyframes price-fade {
        from { opacity: 0.5; }
        to { opacity: 1; }
      }
      .animate-price-fade {
        animation: price-fade 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes check-draw {
        from { stroke-dashoffset: 24; opacity: 0.6; }
        to { stroke-dashoffset: 0; opacity: 1; }
      }
      .animate-check-draw {
        stroke-dasharray: 24;
        animation: check-draw 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) 0.2s forwards;
        stroke-dashoffset: 24;
      }
      /* Иконка успеха: анимация галочки (альтернатива check-draw для path/stroke) */
      @keyframes check-stroke {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-check-stroke {
        animation: check-stroke 0.35s cubic-bezier(0.25, 0.8, 0.25, 1) 0.15s forwards;
        opacity: 0;
      }
      @keyframes circle-fade {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-circle-fade {
        animation: circle-fade 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      .transition-etoro {
        transition-duration: 200ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      .transition-etoro-card {
        transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 40s linear infinite;
      }
      /* График: плавное появление 0.6s */
      @keyframes chart-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-chart-in {
        animation: chart-fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      /* Skeleton: лёгкий shimmer для заливки */
      @keyframes shimmer {
        0% { opacity: 0.02; }
        50% { opacity: 0.06; }
        100% { opacity: 0.02; }
      }

      /* Simple triangle shape for auth decor */
      .clip-triangle {
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      }

      /* Order Book: Flash effect — мягкая смена цвета при обновлении цены (300ms) */
      @keyframes flash-up {
        from { background-color: var(--color-flash-up); }
        to { background-color: transparent; }
      }
      @keyframes flash-down {
        from { background-color: var(--color-flash-down); }
        to { background-color: transparent; }
      }
      .animate-flash-up {
        animation: flash-up var(--duration-flash) var(--ease-modal) forwards;
      }
      .animate-flash-down {
        animation: flash-down var(--duration-flash) var(--ease-modal) forwards;
      }

      /* Модалки и вкладки: cubic-bezier(0.4, 0, 0.2, 1) */
      .transition-modal {
        transition: opacity var(--duration-modal) var(--ease-modal),
                    transform var(--duration-modal) var(--ease-modal);
      }

      /* Hover: деликатное подсвечивание строк и кнопок */
      .hover-row:hover {
        background-color: rgba(255, 255, 255, 0.04);
        transition: background-color 0.15s var(--ease-modal);
      }
      .hover-glow:focus-visible,
      .hover-glow:hover {
        box-shadow: 0 0 0 1px rgba(33, 176, 83, 0.25);
        transition: box-shadow 0.2s var(--ease-modal);
      }

      /* Тонкий разделитель (без «коробки» между экраном и навигацией) */
      .border-subtle {
        border: var(--border-subtle);
      }
      .hairline-top {
        box-shadow: inset 0 1px 0 0 var(--hairlineStrong, rgba(255, 255, 255, 0.09));
      }
      .hairline-bottom {
        box-shadow: inset 0 -1px 0 0 var(--hairlineStrong, rgba(255, 255, 255, 0.09));
      }

      /* Полноэкранный оверлей под модалки и экраны */
      .fullscreen-overlay {
        position: fixed;
        inset: 0;
        min-height: 100dvh;
        min-height: 100vh;
        z-index: 100;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      /* Мин. зона нажатия для тач-устройств (44px+) */
      .touch-target {
        min-height: 44px;
        min-width: 44px;
      }
      /* Плавный скролл как в нативном приложении */
      .scroll-app {
        -webkit-overflow-scrolling: touch;
        overflow-scrolling: touch;
      }

      /* Safe-area: нижний отступ для шитов и фиксированных блоков */
      .pb-safe {
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      }
